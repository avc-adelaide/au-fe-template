name: Compile Theory Document

on:
  push:
    branches:
      - main
    paths:
      - 'theory/**'
      - '.github/workflows/publish-theory.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Compile LaTeX
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile fenics_theory.tex to PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: fenics_theory.tex
          working_directory: theory

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: fenics_theory.pdf
          path: theory